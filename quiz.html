<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santuario Divino | Descubre tu oración</title>

<script>
!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
document,'script','https://connect.facebook.net/en_US/fbevents.js');
fbq('init', '2628120420939405');
fbq('track', 'PageView');
</script>

<style>
  :root {
    --bg: #0a0a0a;
    --bg-card: #171614;
    --border: #3a3833;
    --text-primary: #f0ece2;
    --text-secondary: #cfc9bc;
    --text-tertiary: #8a8579;
    --accent: #7a2e22;
    --accent-light: #b8895a;
    --track: #2a2925;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .quiz-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.5rem;
    gap: 1.75rem;
    text-align: center;
  }

  .progress-row {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--track);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent-light);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-tertiary);
    white-space: nowrap;
  }

  .breadcrumb {
    font-size: 12px;
    color: var(--text-tertiary);
    margin: 0;
  }

  .qtext {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(19px, 4vw, 22px);
    line-height: 1.5;
    max-width: 440px;
    font-weight: 500;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 420px;
  }

  .option-btn {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    color: var(--text-secondary);
    padding: 15px 16px;
    border-radius: 8px;
    font-size: 14.5px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .option-btn:hover {
    background: #1d1b18;
    border-color: var(--accent-light);
  }

  .text-input {
    width: 100%;
    max-width: 420px;
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    color: var(--text-primary);
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
  }

  .text-input:focus {
    outline: none;
    border-color: var(--accent-light);
  }

  .continue-btn {
    background: var(--accent);
    border: none;
    color: var(--text-primary);
    padding: 14px 32px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    max-width: 420px;
  }

  .continue-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .dest-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 420px;
  }

  .dest-btn {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    color: var(--text-primary);
    padding: 18px 16px;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .dest-btn.selected {
    border-color: var(--accent-light);
    background: #1d1813;
  }

  .extra-fields {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 420px;
    margin-top: 4px;
  }

  .field-label {
    font-size: 11px;
    color: var(--text-tertiary);
    text-align: left;
    letter-spacing: 0.5px;
  }

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    color: var(--text-secondary);
    padding: 9px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  .chip.selected {
    border-color: var(--accent-light);
    background: #1d1813;
    color: var(--text-primary);
  }

  .fade-in {
    animation: fadeIn 0.35s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .fade-in { animation: none; }
  }
</style>
</head>
<body>

<div class="quiz-screen" id="quiz-container"></div>

<script>
  function track(eventName, params) {
    if (typeof fbq !== 'undefined') fbq('track', eventName, params || {});
  }

  const answers = {};

  const questions = [
    {
      id: 'destinatario',
      text: '¿Para quién es esta oración?',
      type: 'combo_destinatario'
    },
    {
      id: 'area_vida',
      text: '¿Qué es lo que más pesa en tu corazón hoy?',
      type: 'choice',
      showIf: (a) => a.destinatario && a.destinatario.tipo === 'personal',
      options: [
        { label: 'Mi salud o la de alguien que amo', santo: 'San Rafael Arcángel' },
        { label: 'Un miedo que no me deja en paz', santo: 'San Miguel Arcángel' },
        { label: 'Mi familia o mis hijos', santo: 'Virgen María' },
        { label: 'Algo que necesito perdonar o soltar', santo: 'Jesús' }
      ]
    },
    {
      id: 'emocion',
      text: 'Si pudieras decirle una sola frase a Dios ahora mismo, ¿cuál sería el sentimiento detrás?',
      type: 'choice',
      showIf: (a) => a.destinatario && a.destinatario.tipo === 'personal',
      options: [
        'Ayúdame, ya no puedo más',
        'Dame fuerzas para seguir',
        'Perdóname o ayúdame a perdonar',
        'Gracias, aunque esté sufriendo'
      ]
    },
    {
      id: 'nombre',
      text: '¿Cómo te llamas? Tu oración llevará tu nombre.',
      type: 'text',
      placeholder: 'Escribe tu nombre',
      showIf: (a) => a.destinatario && a.destinatario.tipo === 'personal'
    },
    {
      id: 'motivo_otro',
      text: '¿Por qué deseas interceder por ella?',
      type: 'choice',
      showIf: (a) => a.destinatario && a.destinatario.tipo === 'otro',
      options: [
        { label: 'Por su salud', santo: 'San Rafael Arcángel' },
        { label: 'Por su dinero o trabajo', santo: 'San Rafael Arcángel' },
        { label: 'Por protección espiritual', santo: 'San Miguel Arcángel' },
        { label: 'Por su paz y consuelo', santo: 'Virgen María' },
        { label: 'Por una causa difícil', santo: 'Santa Rita de Casia' }
      ]
    },
    {
      id: 'listo',
      text: '¿Estás listo o lista para recibir tu oración?',
      textOtro: '¿Estás listo o lista para recibir la sanación?',
      type: 'choice',
      options: [
        'Sí, la necesito ahora',
        'Sí, con todo mi corazón'
      ]
    }
  ];

  let currentIndex = 0;

  function getVisibleQuestions() {
    return questions.filter(q => !q.showIf || q.showIf(answers));
  }

  function render() {
    const visible = getVisibleQuestions();
    const visibleIndex = visible.indexOf(questions[currentIndex]);
    const q = questions[currentIndex];
    const container = document.getElementById('quiz-container');
    const progressPct = Math.round((visibleIndex / visible.length) * 100);

    const esParaOtroActual = answers.destinatario && answers.destinatario.tipo === 'otro';
    const qtext = (esParaOtroActual && q.textOtro) ? q.textOtro : q.text;

    let breadcrumbHtml = '';
    const motivoRespondido = answers.area_vida || answers.motivo_otro;
    if (currentIndex > 0 && motivoRespondido && q.id !== 'destinatario') {
      breadcrumbHtml = `<p class="breadcrumb">Elegiste: ${motivoRespondido.label.toLowerCase()}</p>`;
    }

    let bodyHtml = '';

    if (q.type === 'combo_destinatario') {
      const tipo = answers.destinatario ? answers.destinatario.tipo : null;
      const parentescoSel = answers.parentesco ? answers.parentesco.label : null;
      bodyHtml = `
        <div class="dest-options">
          <button class="dest-btn ${tipo === 'personal' ? 'selected' : ''}" onclick="setDestinatario('personal')">Es para mí</button>
          <button class="dest-btn ${tipo === 'otro' ? 'selected' : ''}" onclick="setDestinatario('otro')">Es para otra persona</button>
        </div>
        <div class="extra-fields" id="extra-fields" style="display:${tipo === 'otro' ? 'flex' : 'none'}">
          <span class="field-label">¿Cómo se llama?</span>
          <input type="text" class="text-input" id="nombre-destinatario-input" placeholder="Su nombre" maxlength="40" value="${answers.nombre_destinatario ? answers.nombre_destinatario.label : ''}">
          <span class="field-label">¿Qué es para ti?</span>
          <div class="chip-row" id="parentesco-chips">
            ${['Mi madre o mi padre', 'Mi hijo o mi hija', 'Mi pareja', 'Un familiar', 'Un amigo o amiga'].map(p =>
              `<button class="chip ${parentescoSel === p ? 'selected' : ''}" onclick="setParentesco('${p}')">${p}</button>`
            ).join('')}
          </div>
        </div>
        <button class="continue-btn" id="continue-btn-dest" style="margin-top:8px" disabled onclick="confirmDestinatario()">Continuar</button>
      `;
    } else if (q.type === 'choice') {
      bodyHtml = `<div class="options">` +
        q.options.map((opt, i) => {
          const label = typeof opt === 'string' ? opt : opt.label;
          return `<button class="option-btn" onclick="selectOption(${i})">${label}</button>`;
        }).join('') +
        `</div>`;
    } else if (q.type === 'text') {
      bodyHtml = `
        <input type="text" class="text-input" id="text-answer" placeholder="${q.placeholder}" maxlength="40">
        <button class="continue-btn" id="continue-btn" disabled onclick="submitText()">Continuar</button>
      `;
    }

    container.innerHTML = `
      <div class="fade-in" style="display:flex;flex-direction:column;align-items:center;gap:1.75rem;width:100%">
        <div class="progress-row">
          <div class="progress-track"><div class="progress-fill" style="width:${progressPct}%"></div></div>
          <span class="progress-label">${visibleIndex + 1} de ${visible.length}</span>
        </div>
        ${breadcrumbHtml}
        <p class="qtext">${qtext}</p>
        ${bodyHtml}
      </div>
    `;

    if (q.type === 'text') {
      const input = document.getElementById('text-answer');
      const btn = document.getElementById('continue-btn');
      input.addEventListener('input', () => {
        btn.disabled = input.value.trim().length === 0;
      });
      input.focus();
    }

    if (q.type === 'combo_destinatario') {
      updateDestContinueBtn();
    }

    track('ViewContent', { content_name: 'quiz_pregunta_' + (visibleIndex + 1) });
  }

  function setDestinatario(tipo) {
    answers.destinatario = { tipo };
    if (tipo === 'personal') {
      advance();
    } else {
      render();
    }
  }

  function setParentesco(label) {
    answers.parentesco = { label };
    render();
  }

  function updateDestContinueBtn() {
    const btn = document.getElementById('continue-btn-dest');
    const nombreInput = document.getElementById('nombre-destinatario-input');
    if (nombreInput) {
      nombreInput.addEventListener('input', () => {
        answers.nombre_destinatario = { label: nombreInput.value.trim() };
        updateDestContinueBtn();
      });
    }
    if (!btn) return;
    const tipo = answers.destinatario ? answers.destinatario.tipo : null;
    if (tipo === 'personal') {
      btn.disabled = false;
    } else if (tipo === 'otro') {
      const nombreOk = answers.nombre_destinatario && answers.nombre_destinatario.label;
      const parentescoOk = answers.parentesco && answers.parentesco.label;
      btn.disabled = !(nombreOk && parentescoOk);
    } else {
      btn.disabled = true;
    }
  }

  function confirmDestinatario() {
    advance();
  }

  function selectOption(i) {
    const q = questions[currentIndex];
    const opt = q.options[i];
    answers[q.id] = typeof opt === 'string' ? { label: opt } : opt;
    advance();
  }

  function submitText() {
    const input = document.getElementById('text-answer');
    const value = input.value.trim();
    if (!value) return;
    answers[questions[currentIndex].id] = { label: value };
    advance();
  }

  function advance() {
    currentIndex++;
    while (currentIndex < questions.length && questions[currentIndex].showIf && !questions[currentIndex].showIf(answers)) {
      currentIndex++;
    }
    if (currentIndex >= questions.length) {
      finishQuiz();
    } else {
      render();
    }
  }

  function finishQuiz() {
    track('Lead', { content_name: 'quiz_completado' });

    const esParaOtro = answers.destinatario && answers.destinatario.tipo === 'otro';

    const motivoRespondido = esParaOtro ? answers.motivo_otro : answers.area_vida;
    const santo = motivoRespondido && motivoRespondido.santo ? motivoRespondido.santo : 'San Rafael Arcángel';

    const nombre = esParaOtro
      ? (answers.nombre_destinatario ? answers.nombre_destinatario.label : '')
      : (answers.nombre ? answers.nombre.label : '');

    const peticion = esParaOtro
      ? (motivoRespondido ? motivoRespondido.label : '')
      : (answers.emocion ? answers.emocion.label : '');

    const parentesco = esParaOtro && answers.parentesco ? answers.parentesco.label : '';

    const params = new URLSearchParams({
      nombre: nombre,
      santo: santo,
      peticion: peticion,
      parentesco: parentesco,
      esParaOtro: esParaOtro ? '1' : '0'
    });

    window.location.href = 'loader.html?' + params.toString();
  }

  render();
</script>

</body>
</html>
